services:
  postgres:
    image: postgres:16-alpine
    container_name: vkr_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vkr_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vkr_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
